<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Typeahead</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="app">
    <h1>🔍 Search Typeahead</h1>
    <p class="subtitle">Type a prefix to see suggestions. Press Enter or click Search to submit.</p>

    <!-- Search box + suggestion dropdown -->
    <div class="search-wrap">
      <div class="search-row">
        <div class="combo">
          <input
            id="search-input"
            type="text"
            autocomplete="off"
            placeholder="Try: ip, java, run, pizza, stock…"
            aria-label="Search"
            aria-autocomplete="list"
            aria-controls="suggestions"
          />
          <ul id="suggestions" class="suggestions hidden" role="listbox"></ul>
        </div>
        <button id="search-btn" type="button">Search</button>
      </div>

      <label class="toggle">
        <input type="checkbox" id="recency-toggle" checked />
        Recency-aware ranking <span class="hint">(uncheck for pure all-time count)</span>
      </label>
    </div>

    <!-- States + dummy response -->
    <div id="status" class="status" aria-live="polite"></div>
    <div id="response" class="response hidden"></div>

    <!-- Trending -->
    <section class="trending">
      <h2>🔥 Trending now</h2>
      <ul id="trending-list" class="trending-list">
        <li class="muted">No trending data yet — submit some searches.</li>
      </ul>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
